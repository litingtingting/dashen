# 智能客服系统 - 配置文件示例
# 复制为 config.yml 后填写实际值

# ==================== 系统配置 ====================
system:
  name: "智能客服系统"
  version: "1.0.0"
  env: "production"  # development | production
  timezone: "Asia/Shanghai"

# ==================== 服务器配置 ====================
server:
  host: "0.0.0.0"
  port: 8080
  # 对外域名（需备案 + HTTPS）
  domain: "your-domain.com"  # TODO: 替换为你的备案域名
  # HTTPS 证书路径
  ssl:
    enabled: true
    cert_file: "/etc/ssl/certs/your-domain.crt"  # TODO: 证书文件路径
    key_file: "/etc/ssl/private/your-domain.key"  # TODO: 密钥文件路径

# ==================== 数据库配置 ====================
database:
  type: "sqlite"  # sqlite | mysql
  # SQLite 配置
  sqlite:
    path: "./data/smart-cs.db"
  # MySQL 配置（如后期扩展）
  mysql:
    host: "localhost"
    port: 3306
    user: "root"
    password: "your-password"
    database: "smart_cs"

# ==================== 平台对接配置 ====================
platforms:
  # ---------- 微信公众号 ----------
  wechat:
    enabled: false  # TODO: 准备好后改为 true
    app_id: ""  # TODO: 微信公众号 AppID
    app_secret: ""  # TODO: 微信公众号 AppSecret
    token: ""  # TODO: 自定义 Token
    encoding_aes_key: ""  # TODO: 消息加解密密钥
    # 回调地址（自动拼接）
    callback_url: "https://your-domain.com/api/wechat/callback"

  # ---------- 淘宝店铺 ----------
  taobao:
    enabled: false  # TODO: 准备好后改为 true
    app_key: ""  # TODO: 阿里开放平台 AppKey
    app_secret: ""  # TODO: 阿里开放平台 AppSecret
    callback_url: "https://your-domain.com/api/taobao/callback"

  # ---------- 抖音 ----------
  douyin:
    enabled: false  # TODO: 准备好后改为 true
    app_key: ""  # TODO: 抖音开放平台 AppKey
    app_secret: ""  # TODO: 抖音开放平台 AppSecret
    callback_url: "https://your-domain.com/api/douyin/callback"

# ==================== AI 配置 ====================
ai:
  provider: "bailian"  # 阿里云百炼
  api_key: ""  # TODO: 百炼 API Key
  model: "qwen-plus"  # 使用的模型
  # 输出过滤配置
  filter:
    enabled: true
    sensitive_words_file: "./configs/sensitive-words.txt"
    max_response_length: 500  # 最大回复长度

# ==================== 管理员配置 ====================
admin:
  # 超级管理员（丽斯飞书）
  super_admin:
    tenant_id: "lishi-feishu"
    username: "admin"
    password_hash: ""  # TODO: 初始密码哈希

# ==================== 日志配置 ====================
log:
  level: "info"  # debug | info | warn | error
  file: "./logs/server.log"
  max_size_mb: 100
  max_days: 7

# ==================== 数据清理配置 ====================
cleanup:
  # 对话记录保留天数
  conversation_retain_days: 7
  # 清理任务执行时间（cron 表达式）
  schedule: "0 2 * * *"  # 每天凌晨 2 点

# ==================== 其他配置 ====================
# 企业对接页面配置
join_page:
  enabled: true
  url: "https://your-domain.com/join"
  # 提交后通知方式
  notify:
    email: ""  # TODO: 接收通知的邮箱
    feishu_webhook: ""  # TODO: 飞书 webhook（可选）
