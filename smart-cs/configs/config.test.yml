# 智能客服系统 - 测试配置文件
# 用于本地测试和流程验证

# ==================== 系统配置 ====================
system:
  name: "智能客服系统 (测试)"
  version: "1.0.0-test"
  env: "development"
  timezone: "Asia/Shanghai"

# ==================== 服务器配置 ====================
server:
  host: "0.0.0.0"
  port: 8080
  domain: "localhost"
  ssl:
    enabled: false
    cert_file: ""
    key_file: ""

# ==================== 数据库配置 ====================
database:
  type: "sqlite"
  sqlite:
    path: "./data/smart-cs-test.db"

# ==================== 平台对接配置 ====================
platforms:
  wechat:
    enabled: false
    app_id: ""
    app_secret: ""
    token: ""
    encoding_aes_key: ""
    callback_url: ""

  taobao:
    enabled: false
    app_key: ""
    app_secret: ""
    callback_url: ""

  douyin:
    enabled: false
    app_key: ""
    app_secret: ""
    callback_url: ""

# ==================== AI 配置 ====================
ai:
  provider: "bailian"
  api_key: "${BAILIAN_API_KEY}"  # 从环境变量读取
  model: "qwen-plus"
  filter:
    enabled: false  # 测试时关闭过滤
    sensitive_words_file: ""
    max_response_length: 1000

# ==================== 管理员配置 ====================
admin:
  super_admin:
    tenant_id: "test-tenant"
    username: "test-admin"
    password_hash: ""

# ==================== 日志配置 ====================
log:
  level: "debug"
  file: "./logs/test-server.log"
  max_size_mb: 50
  max_days: 3

# ==================== 数据清理配置 ====================
cleanup:
  conversation_retain_days: 1
  schedule: "0 2 * * *"
