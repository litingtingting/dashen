# docker-compose.yml - OpenClaw 网关 + CLI + 自定义智能体 qianduoduo (跨目录引用)
# 基于官方 docker-setup.sh 生成，增加了安全加固、资源限制和内部网络

networks:
  # 自定义内部网络，容器间通过服务名通信
  internal-net:
    driver: bridge
    internal: false                     # 允许容器访问外网（如调用飞书/百炼 API）
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: openclaw-gateway
    restart: unless-stopped
    networks:
      - internal-net                    # 加入内部网络
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    env_file:
      .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENCLAW_GATEWAY_MODE: local
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      ## 如需启用沙箱，取消以下注释并设置 DOCKER_GID
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    command:
      - "node"
      - "dist/index.js"
      - "gateway"
      - "--bind"
      - "${OPENCLAW_GATEWAY_BIND:-lan}"
      - "--port"
      - "18789"
    # 安全加固
    user: "1000:1000"                    # 以 node 用户运行（UID 1000）
    read_only: true                       # 根文件系统只读
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256M   # 临时可写空间
    cap_drop:
      - ALL                                # 删除所有 Linux 能力
    security_opt:
      - no-new-privileges:true             # 禁止提权
    mem_limit: 1.5g                         # 内存硬限制
    memswap_limit: 1.5g                     # 禁用 swap
    cpus: '1.5'                              # CPU 限制
    pids_limit: 200                          # 进程数限制
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    init: true

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"   # 共享网关的网络命名空间
    depends_on:
      - openclaw-gateway
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    env_file:
      .env
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENCLAW_GATEWAY_MODE: local
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    # 可选的资源限制（CLI 通常短暂运行，可以不设硬限制）
    mem_limit: 512m
    cpus: '0.5'

  # 你的自定义智能体服务（qianduoduo），位于上级目录
  qianduoduo:
    build:
      context: ${AGENT_QIANDUODUO_DIR}                     # 构建上下文指向上级的 qianduoduo 目录
      dockerfile: Dockerfile.qianduoduo           # 如果 Dockerfile 名称不同，请修改
    image: qianduoduo:latest
    container_name: qianduoduo-quant
    restart: unless-stopped
    depends_on:
      - openclaw-gateway
    networks:
      - internal-net
    expose:
      - "5000"                # 暴露 5000 端口给 internal-net 内的其他容器
    env_file:
      - ${AGENT_QIANDUODUO_DIR}/.env.qianduoduo            # 引用上级目录的环境变量文件
    environment:
      AGENT_QIANDUODUO_DIR: /home/user/projects/qianduoduo/agent-qianduoduo
    volumes:
      - qianduoduo-data:/app/qianduoduo/data
      - ${AGENT_QIANDUODUO_DIR}/skills:/app/qianduoduo/skills:ro
      - ${AGENT_QIANDUODUO_DIR}/AGENTS.md:/app/qianduoduo/AGENTS.md:ro
      - ${AGENT_QIANDUODUO_DIR}/TOOLS.md:/app/qianduoduo/TOOLS.md:ro
      - ${AGENT_QIANDUODUO_DIR}/permission:/app/qianduoduo/permission:ro
    # 安全加固
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '1.0'
    pids_limit: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 如果智能体需要暴露端口供外部访问，取消注释
    # ports:
    #   - "8080:8080"

volumes:
  qianduoduo-data:   # 命名卷，持久化智能体数据
