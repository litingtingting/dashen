# docker-compose.yml - 生产级安全加固版
# 🔧 OpenClaw 网关端口：12131（避免与默认端口冲突）
# ✅ 安全特性：无特权模式、资源限制、只读根文件系统、非root用户、能力最小化、网络隔离、日志限制

networks:
  # 创建内部隔离网络，容器间通过服务名通信，避免共享网络栈带来的风险
  internal-net:
    driver: bridge
    internal: false   # 设为 true 可完全禁止出站外网（如需要）
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    networks:
      - internal-net
    ports:
      - "12131:12131"          # 暴露给宿主机（如有需要），若仅内部使用可移除
    volumes:
      # 数据卷：持久化数据，使用命名卷便于复用和权限管理
      - openclaw-data:/openclaw/data
      # Docker 套接字（高风险，仅当必须管理其他容器时挂载）
      - /var/run/docker.sock:/var/run/docker.sock:ro   # 改为只读挂载，降低风险
    env_file:
      - .env.openclaw
    environment:
      # 限制 JVM 内存（如果 OpenClaw 基于 Java）
      - JAVA_OPTS=-Xms512m -Xmx1g
    command: >
      openclaw gateway start
        --port 12131
        --docker-host unix:///var/run/docker.sock
    # 安全加固配置
    user: "1000:1000"                     # 以非 root 用户运行（假设镜像支持）
    read_only: true                       # 根文件系统只读
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256M   # 临时可写目录（内存）
    cap_drop:
      - ALL                                # 删除所有 Linux 能力
    # 若需要特定能力可在此添加，例如访问 docker.sock 通常不需要额外能力
    # cap_add:
    #   - DAC_OVERRIDE      # 如果需要绕过文件权限检查（谨慎）
    security_opt:
      - no-new-privileges:true             # 禁止提权
    pids_limit: 200                         # 限制进程数
    mem_limit: 2g                            # 内存硬限制
    memswap_limit: 2g                        # 禁用 swap（生产环境推荐）
    cpus: '1.5'                               # CPU 核心限制
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12131/health"]   # 假设有健康端点
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  qianduoduo:
    build:
      context: .
      dockerfile: Dockerfile
    image: qianduoduo:latest
    container_name: qianduoduo-quant
    restart: unless-stopped
    networks:
      - internal-net
    # 不再共享网络栈，而是通过服务名访问 openclaw（例如 http://openclaw:12131）
    # 如果必须使用 localhost 通信，可改为 network_mode: "service:openclaw"，但安全性较低
    depends_on:
      openclaw:
        condition: service_healthy        # 等待 openclaw 健康后再启动
    volumes:
      - qianduoduo-data:/app/qianduoduo/data
      # 配置文件以只读方式挂载
      - ./skills:/app/qianduoduo/skills:ro
      - ./AGENTS.md:/app/qianduoduo/AGENTS.md:ro
      - ./TOOLS.md:/app/qianduoduo/TOOLS.md:ro
      - ./permission:/app/qianduoduo/permission:ro
    env_file:
      - .env.qianduoduo
    # 安全加固配置（类似 openclaw，根据实际需求调整）
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 如果 qianduoduo 也需要健康检查，可添加类似配置

volumes:
  openclaw-data:
    # 可以指定外部卷驱动或标签，这里保持默认
  qianduoduo-data:
